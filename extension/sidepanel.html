<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lancerdesk</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <h1 class="logo">Lancerdesk</h1>
      <span id="status-dot" class="status-dot status-idle" title="연결 상태"></span>
    </header>

    <!-- Login Section -->
    <section id="login-section" class="section">
      <h2 class="section-title">로그인</h2>
      <div class="form-group">
        <label for="email-input">이메일</label>
        <input type="email" id="email-input" placeholder="이메일 입력" />
      </div>
      <div class="form-group">
        <label for="password-input">비밀번호</label>
        <input type="password" id="password-input" placeholder="비밀번호 입력" />
      </div>
      <button id="login-btn" class="btn btn-primary">로그인</button>
      <div id="login-error" class="error-msg hidden" style="color:#ef4444;font-size:0.75rem;margin-top:0.5rem;"></div>
    </section>

    <!-- 로그인 상태: 우측 하단 프로필 버튼 -->
    <section id="user-section" class="section hidden" style="display:none;">
      <!-- 실제 표시는 하단 고정 버튼으로 -->
    </section>

    <hr class="divider" />

    <!-- Current Chat Section -->
    <section id="chat-section" class="section">
      <h2 class="section-title">현재 대화</h2>
      <div id="chat-meta" class="meta-box">
        <p id="chat-client-id">고객 ID: -</p>
        <p id="chat-client-name">고객명: -</p>
        <p id="chat-category">카테고리: -</p>
        <p id="chat-message-count">메시지 수: -</p>
      </div>

      <!-- 처음부터 크롤링 버튼 -->
      <button id="crawl-btn" class="btn btn-outline btn-sm crawl-btn">
        📜 처음부터 대화 불러오기
      </button>
      <div id="crawl-status" class="crawl-status hidden"></div>

      <!-- 답변 스타일 -->
      <div id="style-section" style="margin-top:10px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
          <span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:#9ca3af;">답변 스타일</span>
          <button id="add-style-btn" class="btn btn-outline btn-sm">+ 추가</button>
        </div>
        <div id="style-list" class="style-list"></div>
        <div id="add-style-form" class="add-style-form hidden">
          <div class="form-group">
            <label for="style-name-input">스타일 이름</label>
            <input type="text" id="style-name-input" placeholder="예: 친근하게" />
          </div>
          <div class="form-group">
            <label for="style-prompt-input">프롬프트 지침</label>
            <textarea id="style-prompt-input" rows="2" placeholder="예: 친근하고 편안한 말투로 작성해주세요"></textarea>
          </div>
          <div style="display:flex;gap:6px;">
            <button id="save-style-btn" class="btn btn-primary" style="flex:1;margin-top:0;">저장</button>
            <button id="cancel-style-btn" class="btn btn-outline" style="flex:1;">취소</button>
          </div>
        </div>
      </div>

      <button id="get-suggestion-btn" class="btn btn-accent">
        AI 답변 추천 받기
      </button>
      <div id="suggestion-box" class="suggestion-box hidden">
        <p class="suggestion-label">추천 답변</p>
        <p id="suggestion-text"></p>
        <button id="copy-btn" class="btn btn-outline">클립보드에 복사</button>
      </div>
      <div id="ai-loading" class="loading-msg hidden">AI가 답변을 생성 중...</div>
      <div id="ai-error" class="error-msg hidden"></div>
    </section>

    <hr class="divider" />

    <!-- Recent Conversations Section -->
    <section id="conversations-section" class="section">
      <h2 class="section-title">최근 대화 목록</h2>
      <ul id="conversation-list" class="conversation-list">
        <li class="empty-msg">대화가 없습니다.</li>
      </ul>
    </section>

    <!-- 하단 여백 (하단 고정 버튼들과 겹치지 않게) -->
    <div style="height:64px;"></div>
  </div>

  <!-- 하단 중앙 고정: AI 참고 대화 버튼 -->
  <div id="bottom-bar" class="bottom-bar">
    <button id="ref-open-btn" class="ref-fab">
      <span>💬 AI 참고 대화</span>
      <span id="ref-toggle-count" class="ref-count">0개</span>
    </button>
  </div>

  <!-- 좌측 하단 고정: 프로필/로그아웃 -->
  <div id="profile-fab-wrap" class="profile-fab-wrap hidden">
    <div id="profile-fab-menu" class="profile-fab-menu profile-fab-menu-left hidden">
      <span id="user-email-display" class="fab-email"></span>
      <button id="logout-btn" class="btn btn-outline btn-sm" style="margin-top:6px;">로그아웃</button>
    </div>
    <button id="profile-fab" class="profile-fab" title="프로필">👤</button>
  </div>

  <!-- 우측 하단 고정: 대시보드 이동 -->
  <div id="dashboard-fab-wrap" class="dashboard-fab-wrap">
    <button id="dashboard-fab" class="dashboard-fab" title="대시보드 열기">📊</button>
  </div>

  <!-- AI 참고 대화 오버레이 (바텀시트) -->
  <div id="ref-overlay" class="ref-overlay hidden">
    <div id="ref-overlay-panel" class="ref-overlay-panel">
      <div class="ref-overlay-header">
        <span class="ref-overlay-title">AI 참고 대화 범위 설정</span>
        <button id="ref-overlay-close" class="ref-overlay-close">✕</button>
      </div>

      <!-- 범위 슬라이더 -->
      <div class="ref-range-section">
        <div class="ref-range-labels">
          <span id="ref-range-start-label">시작: 1번</span>
          <span id="ref-range-info" class="ref-selected-info">0개 선택</span>
          <span id="ref-range-end-label">끝: -번</span>
        </div>
        <div class="ref-range-track-wrap">
          <input type="range" id="ref-range-start" class="ref-range-input" min="1" max="1" value="1" />
          <input type="range" id="ref-range-end"   class="ref-range-input" min="1" max="1" value="1" />
        </div>
        <div class="ref-range-quick">
          <button id="ref-select-all-btn"    class="btn btn-outline btn-sm">전체</button>
          <button id="ref-select-last20-btn" class="btn btn-outline btn-sm">최근 20개</button>
          <button id="ref-select-last10-btn" class="btn btn-outline btn-sm">최근 10개</button>
          <button id="ref-select-last5-btn"  class="btn btn-outline btn-sm">최근 5개</button>
        </div>
      </div>

      <!-- 미리보기 목록 -->
      <ul id="ref-overlay-list" class="ref-overlay-list"></ul>

      <div class="ref-overlay-footer">
        <button id="ref-confirm-btn" class="btn btn-accent">이 범위로 AI 답변 받기</button>
      </div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
